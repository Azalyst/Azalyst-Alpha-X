name: "Alpha X Bot Runner"

on:
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Alpha X Scanner
        env:
          MAX_LOOPS: "2" # Run 2 full scans and exit
          BINANCE_PROXY_URL: ${{ secrets.BINANCE_PROXY_URL || 'https://fapi.binance.com' }}
        run: |
          python main.py

      - name: Run Qwen Autonomous Agent
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          BINANCE_PROXY_URL: ${{ secrets.BINANCE_PROXY_URL || 'https://fapi.binance.com' }}
        run: |
          python qwen_agent.py

      - name: Generate Dashboard
        run: |
          python dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add paper_trades.json qwen_analysis.json main.py index.html charts/ dashboard.py qwen_agent.py requirements.txt
          git commit -m "Auto-update: scanner run, Qwen analysis, and dashboard [skip ci]" || echo "No changes to commit"
          git push
